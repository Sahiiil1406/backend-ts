<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Coffee Shop - Razorpay</title>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
    }

    .container {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
      text-align: center;
      max-width: 400px;
      width: 90%;
      transition: transform 0.3s ease;
    }

    .container:hover {
      transform: translateY(-5px);
    }

    .coffee-icon {
      font-size: 4rem;
      margin-bottom: 20px;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-10px); }
      60% { transform: translateY(-5px); }
    }

    h1 {
      color: #2c3e50;
      margin-bottom: 10px;
      font-size: 2.2rem;
      font-weight: 600;
    }

    .subtitle {
      color: #7f8c8d;
      margin-bottom: 30px;
      font-size: 1.1rem;
    }

    .subscription-options {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-bottom: 30px;
    }

    .subscription-card {
      border: 2px solid #e9ecef;
      border-radius: 12px;
      padding: 20px;
      cursor: pointer;
      transition: all 0.3s ease;
      background: #f8f9fa;
    }

    .subscription-card:hover {
      border-color: #667eea;
      background: #fff;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
    }

    .subscription-card.selected {
      border-color: #667eea;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .subscription-title {
      font-weight: 600;
      font-size: 1.2rem;
      margin-bottom: 5px;
    }

    .subscription-price {
      font-size: 1.5rem;
      font-weight: bold;
      color: #27ae60;
    }

    .subscription-card.selected .subscription-price {
      color: #fff;
    }

    .subscription-description {
      font-size: 0.9rem;
      opacity: 0.8;
      margin-top: 8px;
    }

    #pay-btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 15px 40px;
      font-size: 1.2rem;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      width: 100%;
      position: relative;
      overflow: hidden;
    }

    #pay-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
    }

    #pay-btn:active {
      transform: translateY(0);
    }

    #pay-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .loading {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 1s ease-in-out infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error-message, .success-message {
      margin-top: 20px;
      padding: 15px;
      border-radius: 8px;
      font-weight: 500;
      display: none;
    }

    .error-message {
      background-color: #fee;
      color: #c33;
      border: 1px solid #fcc;
    }

    .success-message {
      background-color: #efe;
      color: #363;
      border: 1px solid #cfc;
    }

    .secure-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 20px;
      font-size: 0.9rem;
      color: #7f8c8d;
    }

    .secure-icon {
      color: #27ae60;
    }

    @media (max-width: 480px) {
      .container {
        padding: 30px 20px;
      }
      
      h1 {
        font-size: 1.8rem;
      }
      
      .coffee-icon {
        font-size: 3rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="coffee-icon">☕</div>
    <h1>Premium Coffee</h1>
    <p class="subtitle">Choose your perfect subscription plan</p>
    
    <div class="subscription-options">
      <div class="subscription-card" data-id="1" data-price="99">
        <div class="subscription-title">Single Cup</div>
        <div class="subscription-price">₹99</div>
        <div class="subscription-description">Perfect for trying our premium blend</div>
      </div>
      
      <div class="subscription-card selected" data-id="2" data-price="299">
        <div class="subscription-title">Weekly Pack</div>
        <div class="subscription-price">₹299</div>
        <div class="subscription-description">7 cups of premium coffee delivered weekly</div>
      </div>
      
      <div class="subscription-card" data-id="3" data-price="999">
        <div class="subscription-title">Monthly Premium</div>
        <div class="subscription-price">₹999</div>
        <div class="subscription-description">30 cups + exclusive blends & free delivery</div>
      </div>
    </div>

    <button id="pay-btn">
      <span class="btn-text">Pay Now - ₹299</span>
      <div class="loading">
        <div class="spinner"></div>
      </div>
    </button>

    <div class="error-message" id="error-message"></div>
    <div class="success-message" id="success-message"></div>

    <div class="secure-badge">
      <span class="secure-icon">🔒</span>
      Secure payment powered by Razorpay
    </div>
  </div>

  <script>
    let selectedSubscription = {
      id: 2,
      price: 299,
      title: 'Weekly Pack'
    };

    // Handle subscription selection
    document.querySelectorAll('.subscription-card').forEach(card => {
      card.addEventListener('click', function() {
        // Remove selected class from all cards
        document.querySelectorAll('.subscription-card').forEach(c => c.classList.remove('selected'));
        
        // Add selected class to clicked card
        this.classList.add('selected');
        
        // Update selected subscription
        selectedSubscription = {
          id: parseInt(this.dataset.id),
          price: parseInt(this.dataset.price),
          title: this.querySelector('.subscription-title').textContent
        };
        
        // Update button text
        document.querySelector('.btn-text').textContent = `Pay Now - ₹${selectedSubscription.price}`;
      });
    });

    // Show/hide messages
    function showMessage(type, message) {
      const errorEl = document.getElementById('error-message');
      const successEl = document.getElementById('success-message');
      
      errorEl.style.display = 'none';
      successEl.style.display = 'none';
      
      if (type === 'error') {
        errorEl.textContent = message;
        errorEl.style.display = 'block';
      } else if (type === 'success') {
        successEl.textContent = message;
        successEl.style.display = 'block';
      }
    }

    // Set loading state
    function setLoading(loading) {
      const btn = document.getElementById('pay-btn');
      const btnText = document.querySelector('.btn-text');
      const loadingEl = document.querySelector('.loading');
      
      if (loading) {
        btn.disabled = true;
        btnText.style.opacity = '0';
        loadingEl.style.display = 'block';
      } else {
        btn.disabled = false;
        btnText.style.opacity = '1';
        loadingEl.style.display = 'none';
      }
    }

    // Payment handler
    document.getElementById("pay-btn").onclick = async function () {
      try {
        setLoading(true);
        showMessage('', '');

        const response = await fetch("http://localhost:8000/payments/create-order", {
          method: "POST",
          headers: { 
            "Content-Type": "application/json",
            "Authorization": `Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VyX2lkIjo4LCJlbWFpbCI6InRlc3RAZ21haWwuY29tIiwic3Vic2NyaXB0aW9uRXhwaXJ5IjoiMjAyNS0wNi0yOVQxMzo0NDo0OS41NDRaIiwiaWF0IjoxNzUxMjA0Nzk4LCJleHAiOjE3NTE4MDk1OTh9.BWIEf5XrM1I_9PyjUFMaK9CocCmfqJ2Rb8Qd_jRnigo` // Add auth if needed
          },
          body: JSON.stringify({ 
            subscriptionId: selectedSubscription.id 
          }),
        });

        if (!response.ok) {
          const errorData = await response.json();
          throw new Error(errorData.error || 'Failed to create order');
        }

        const data = await response.json();
        console.log('Order Data:', data.data);
        
        const options = {
          key: "rzp_test_eC3b2BUEMhsRuB", // Replace with your actual key
          amount: data.data.amount,
          currency: data.data.currency,
          name: "Premium Coffee Shop",
          description: selectedSubscription.title,
          order_id: data.data.orderId,
          handler: function (response) {
            setLoading(false);
            showMessage('success', `Payment successful! Transaction ID: ${response.razorpay_payment_id}`);
            console.log('Payment Success:', response);
            
            // You can redirect or update UI here
            setTimeout(() => {
              // window.location.href = '/success';
            }, 2000);
          },
          prefill: {
            name: "Coffee Lover",
            email: "customer@example.com",
            contact: "+919999999999"
          },
          theme: { 
            color: "#667eea" 
          },
          modal: {
            ondismiss: function() {
              setLoading(false);
              showMessage('error', 'Payment cancelled');
            }
          }
        };

        const rzp = new Razorpay(options);
        
        rzp.on('payment.failed', function (response) {
          setLoading(false);
          showMessage('error', `Payment failed: ${response.error.description}`);
          console.error('Payment Failed:', response.error);
        });

        rzp.open();
        setLoading(false);

      } catch (error) {
        setLoading(false);
        showMessage('error', error.message || 'Something went wrong. Please try again.');
        console.error('Error:', error);
      }
    };

    // Add some interactive effects
    document.addEventListener('DOMContentLoaded', function() {
      // Animate container on load
      setTimeout(() => {
        document.querySelector('.container').style.opacity = '1';
        document.querySelector('.container').style.transform = 'translateY(0)';
      }, 100);
    });
  </script>
</body>
</html>
