openapi: 3.0.0

paths:
  /api/notes:
    get:
      tags: [Note]
      summary: List notes (admin sees all, others own)
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100 }
        - in: query
          name: cursor
          schema: { type: string }
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: course_id
          schema: { type: string, format: uuid }
        - in: query
          name: user_id
          schema: { type: string, format: uuid }
      responses:
        "200": { description: Notes fetched }
    post:
      tags: [Note]
      summary: Create note
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                description: { type: string }
                notes_url: { type: string, format: uri }
                course_id: { type: string, format: uuid }
      responses:
        "201": { description: Note created }

  /api/notes/{id}:
    get:
      tags: [Note]
      summary: Get note by id
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: Note fetched }
    patch:
      tags: [Note]
      summary: Update note
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                description: { type: string }
                notes_url: { type: string, format: uri }
                course_id: { type: string, format: uuid }
      responses:
        "200": { description: Note updated }
    delete:
      tags: [Note]
      summary: Delete note
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: Note deleted }
