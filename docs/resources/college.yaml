openapi: 3.0.0

paths:
  /api/colleges:
    get:
      tags: [College]
      summary: List colleges
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100 }
        - in: query
          name: cursor
          schema: { type: string }
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: category
          schema: { type: string }
      responses:
        "200":
          description: Colleges fetched
    post:
      tags: [College]
      summary: Create college (admin)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                address: { type: string }
                category: { type: string }
      responses:
        "201":
          description: College created

  /api/colleges/{id}:
    get:
      tags: [College]
      summary: Get college by id
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: College fetched }
    patch:
      tags: [College]
      summary: Update college (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                address: { type: string }
                category: { type: string }
      responses:
        "200": { description: College updated }
    delete:
      tags: [College]
      summary: Delete college (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: College deleted }
