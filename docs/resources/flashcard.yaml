openapi: 3.0.0

paths:
  /api/flashcards:
    get:
      tags: [Flashcard]
      summary: List flashcards (admin sees all, others own)
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100 }
        - in: query
          name: cursor
          schema: { type: string }
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: user_id
          schema: { type: string, format: uuid }
      responses:
        "200": { description: Flashcards fetched }
    post:
      tags: [Flashcard]
      summary: Create flashcard
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                description: { type: string }
      responses:
        "201": { description: Flashcard created }

  /api/flashcards/{id}:
    get:
      tags: [Flashcard]
      summary: Get flashcard by id
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: Flashcard fetched }
    patch:
      tags: [Flashcard]
      summary: Update flashcard
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                description: { type: string }
      responses:
        "200": { description: Flashcard updated }
    delete:
      tags: [Flashcard]
      summary: Delete flashcard
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: Flashcard deleted }
