openapi: 3.0.0

paths:
  /api/mindmaps:
    get:
      tags: [Mindmap]
      summary: List mindmaps (admin sees all, others own)
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100 }
        - in: query
          name: cursor
          schema: { type: string }
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: course_id
          schema: { type: string, format: uuid }
        - in: query
          name: user_id
          schema: { type: string, format: uuid }
      responses:
        "200": { description: Mindmaps fetched }
    post:
      tags: [Mindmap]
      summary: Create mindmap
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                url: { type: string, format: uri }
                course_id: { type: string, format: uuid }
      responses:
        "201": { description: Mindmap created }

  /api/mindmaps/{id}:
    get:
      tags: [Mindmap]
      summary: Get mindmap by id
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: Mindmap fetched }
    patch:
      tags: [Mindmap]
      summary: Update mindmap
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                url: { type: string, format: uri }
                course_id: { type: string, format: uuid }
      responses:
        "200": { description: Mindmap updated }
    delete:
      tags: [Mindmap]
      summary: Delete mindmap
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: Mindmap deleted }
