openapi: 3.0.0

paths:
  /api/courses:
    get:
      tags: [Course]
      summary: List courses
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100 }
        - in: query
          name: cursor
          schema: { type: string }
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: college_id
          schema: { type: string, format: uuid }
        - in: query
          name: course_code
          schema: { type: string }
      responses:
        "200": { description: Courses fetched }
    post:
      tags: [Course]
      summary: Create course (admin)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                desc: { type: string }
                course_code: { type: string }
                college_id: { type: string, format: uuid }
      responses:
        "201": { description: Course created }

  /api/courses/{id}:
    get:
      tags: [Course]
      summary: Get course by id
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: Course fetched }
    patch:
      tags: [Course]
      summary: Update course (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                desc: { type: string }
                course_code: { type: string }
                college_id: { type: string, format: uuid }
      responses:
        "200": { description: Course updated }
    delete:
      tags: [Course]
      summary: Delete course (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: Course deleted }
